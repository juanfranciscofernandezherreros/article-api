server:
  port: 8083

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method

article-generator:
  provider: openai # openai | gemini | ollama
  model: gpt-4o
  openai-api-key: ${OPENAIAPIKEY:${OPENAI_API_KEY:}}
  site: https://mi-blog.com
  author-username: adminUser
  language: es
  output-path: src/main/resources/articles

